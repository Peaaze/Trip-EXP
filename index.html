<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FFF2BA" id="themeColorMeta">
<title>Trip-EXP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Thai (Sarabun) renders smaller than Inter at the same px — scale it up to match */
@font-face{ font-family:'SarabunFit'; src:local('Sarabun'); size-adjust:112%; unicode-range:U+0E00-0E7F; }
:root{ --r-pill:999px; }
html[data-theme="light"]{
  color-scheme:light;
  --page:#FFF2BA; --text:#0F3C65; --muted:#5E7A99;
  --glass:rgba(255,255,255,0.40); --glass-field:rgba(255,255,255,0.45); --glass-border:rgba(255,255,255,0.75); --card-border:rgba(255,255,255,0.70);
  --trip-btn:#FFE46E; --trip-btn-text:#0F3C65; --accent:#FFEDA1; --accent-text:#0F3C65; --cream:#FDF4DC;
  --toggle-track:rgba(255,255,255,0.40); --toggle-track-border:rgba(255,255,255,0.85); --toggle-gold:#E8A93B;
  --dropdown:#FFFFFF; --dropdown-border:rgba(15,60,101,0.10);
  --nosync:#E24B4A; --trash:#C0492F; --share-bg:#0F3C65; --share-icon:#FFF2BA;
  --cal-bg:#FFF2BA; --cal-border:rgba(15,60,101,0.12); --cal-sel-bg:#10182B; --cal-sel-text:#FFF2BA;
  --dialog-bg:#F6DF8C; --dialog-ring:#FFFFFF; --cancel-bg:#FFEDA1; --cancel-border:rgba(15,60,101,0.35); --del-bg:#C0492F; --del-text:#10182B;
  --sheet-bg:#FFF2BA; --row-edit:rgba(15,60,101,0.08); --row-edit-ring:rgba(15,60,101,0.25); --scrim:rgba(15,60,101,0.30);
  --cat-food:#CDEF86; --cat-transport:#BAC7FF; --cat-accommodation:#FFD0BA; --cat-sightseeing:#FFBAC7; --cat-eii:#BAEAFF; --cat-pla:#D0BAFF; --cat-others:#97EEDD;
}
html[data-theme="night"]{
  color-scheme:dark;
  --page:#10182B; --text:#FFF2BA; --muted:#A8A292;
  --glass:rgba(255,255,255,0.08); --glass-field:rgba(255,255,255,0.08); --glass-border:rgba(255,255,255,0.14); --card-border:rgba(255,255,255,0.14);
  --trip-btn:#2A5FA6; --trip-btn-text:#FFF2BA; --accent:#213A63; --accent-text:#FFF2BA; --cream:#1A2742;
  --toggle-track:#0F3C65; --toggle-track-border:rgba(255,255,255,0.12); --toggle-gold:#FFC94D;
  --dropdown:#161D30; --dropdown-border:rgba(255,255,255,0.10);
  --nosync:#E24B4A; --trash:#E2705A; --share-bg:#FFF2BA; --share-icon:#0F3C65;
  --cal-bg:#10182B; --cal-border:rgba(255,242,186,0.15); --cal-sel-bg:#FFF2BA; --cal-sel-text:#10182B;
  --dialog-bg:#1A2742; --dialog-ring:rgba(255,255,255,0.18); --cancel-bg:#232F4E; --cancel-border:rgba(255,255,255,0.18); --del-bg:#C0492F; --del-text:#10182B;
  --sheet-bg:#10182B; --row-edit:rgba(255,255,255,0.08); --row-edit-ring:rgba(255,242,186,0.30); --scrim:rgba(0,0,0,0.60);
  --cat-food:#65380F; --cat-transport:#650F3C; --cat-accommodation:#3B3FB0; --cat-sightseeing:#1964A8; --cat-eii:#65630F; --cat-pla:#0F6563; --cat-others:#0F6538;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; forced-color-adjust:none;}
html,body{margin:0; padding:0; background-color:var(--page) !important; -webkit-filter:none; filter:none;}
body{color:var(--text); -webkit-text-fill-color:var(--text); font-family:'Inter','SarabunFit','Sarabun',-apple-system,BlinkMacSystemFont,sans-serif; text-transform:uppercase; transition:background .35s ease,color .35s ease; min-height:100vh; padding:14px; padding-bottom:90px;}
.app{max-width:440px; margin:0 auto;}
/* keep text fill in sync with color so the embedder can't re-tint text */
.app, .app *, .scrim, .scrim *{-webkit-text-fill-color:currentColor;}
button{font-family:inherit; cursor:pointer; text-transform:uppercase;}
.hide{display:none !important;}

/* inline-svg icons */
.ic{width:1em; height:1em; display:inline-block; vertical-align:-0.125em; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex:none;}

.header{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.avatar{width:34px; height:34px; border-radius:50%; background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; color:var(--text); font-size:15px; overflow:hidden;}
.avatar img{width:100%; height:100%; object-fit:cover;}
.uname{font-size:14px; font-weight:500; letter-spacing:0.5px;}
.nosync{margin-left:6px; background:var(--nosync); color:#fff; font-size:10px; font-weight:600; padding:4px 9px; border-radius:var(--r-pill); letter-spacing:0.5px;}
.spacer{margin-left:auto;}

.toggle{width:60px; height:30px; border-radius:var(--r-pill); background:var(--toggle-track); border:1px solid var(--toggle-track-border); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:flex; align-items:center; padding:0 4px; position:relative; transition:background .35s ease;}
.toggle .ic{position:absolute; font-size:13px;}
.toggle .ic-sun{left:9px;} .toggle .ic-moon{right:8px;}
.knob{width:22px; height:22px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; transition:margin .3s ease,background .3s ease,box-shadow .3s ease; box-shadow:0 1px 3px rgba(15,60,101,0.3);}
.knob .ic{position:static; font-size:12px;}
html[data-theme="light"] .toggle .ic-sun{color:var(--toggle-gold);}
html[data-theme="light"] .toggle .ic-moon{color:rgba(15,60,101,0.3);}
html[data-theme="light"] .knob{margin-left:0; margin-right:auto; background:#fff; color:var(--toggle-gold);}
html[data-theme="light"] .knob .ic-moon{display:none;}
html[data-theme="night"] .toggle .ic-sun{color:rgba(255,255,255,0.28);}
html[data-theme="night"] .knob{margin-left:auto; background:#FFF1C2; color:#10182B; animation:glowm 2.4s ease-in-out infinite;}
html[data-theme="night"] .knob .ic-sun{display:none;}
@keyframes glowm{0%,100%{box-shadow:0 0 5px 1px rgba(255,201,77,0.8),0 0 14px 4px rgba(255,201,77,0.5);}50%{box-shadow:0 0 8px 2px rgba(255,201,77,1),0 0 20px 7px rgba(255,201,77,0.65);}}

.trip-btn{width:100%; background:var(--trip-btn); border:none; color:var(--trip-btn-text); padding:11px 16px; border-radius:var(--r-pill); display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; font-weight:700; letter-spacing:0.5px; margin-bottom:12px;}
.card{background:var(--glass); border:1px solid var(--card-border); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-radius:22px; padding:16px;}
.total{background:var(--accent); border-radius:var(--r-pill); padding:12px; text-align:center; margin-bottom:14px;}
.total .lbl{font-size:10px; color:var(--muted); letter-spacing:1px;}
.total .amt{font-size:23px; font-weight:700; color:var(--text);}

.form-box{border:1.5px dashed var(--cream); border-radius:20px; padding:14px; margin-bottom:16px;}
.form-head{display:flex; align-items:center; margin-bottom:10px;}
.form-head .t{font-size:10px; color:var(--muted); letter-spacing:1px;}
.form-head .ic-x{margin-left:auto; color:var(--muted); font-size:15px; cursor:pointer;}
.fields{display:flex; flex-direction:column; gap:8px;}
.fld{font-size:12px; letter-spacing:0.5px; padding:9px 16px; border-radius:var(--r-pill); display:flex; justify-content:space-between; align-items:center; gap:8px; background:var(--glass-field); border:1px solid var(--glass-border); color:var(--text);}
.fld .ic{color:var(--muted); font-size:13px;}
.fld input{flex:1; background:transparent; border:none; outline:none; font-family:inherit; text-transform:uppercase; font-size:12px; color:var(--text); letter-spacing:0.5px; min-width:0;}
.fld input::placeholder{color:var(--muted); opacity:.8;}
.fld.placeholder>span:first-child{color:var(--muted);}
.fld[data-readonly]{cursor:pointer;}
.dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:8px; vertical-align:middle; flex:none;}
.submit{width:100%; margin-top:12px; border:none; background:var(--accent); color:var(--accent-text); border-radius:var(--r-pill); padding:11px; font-size:13px; font-weight:700; letter-spacing:0.5px;}

.sec{font-size:11px; font-weight:500; color:var(--text); letter-spacing:1px; margin:14px 0 8px;}
.date-head{background:var(--accent); padding:7px 14px; border-radius:var(--r-pill); display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.date-head .d{font-size:12px; font-weight:500; color:var(--text);}
.date-head .p{font-size:11px; color:var(--muted);}
.erow{display:flex; align-items:center; padding:6px 12px; border-radius:var(--r-pill); font-size:13px; color:var(--text); gap:6px;}
.erow.editing{background:var(--row-edit); outline:1.5px solid var(--row-edit-ring);}
.erow .desc{flex:1; cursor:pointer; display:flex; align-items:center; min-width:0;}
.erow .desc .txt{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.erow .amt{font-weight:500;}
.erow .ic-trash{font-size:16px; color:var(--trash); margin-left:8px; padding:2px; cursor:pointer;}

.donut-wrap{position:relative; width:160px; height:160px; margin:8px auto 14px; border-radius:50%; box-shadow:0 2px 12px rgba(0,0,0,0.18);}
.donut-hole{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:96px; height:96px; border-radius:50%; background:var(--cream); display:flex; flex-direction:column; align-items:center; justify-content:center;}
.donut-hole .v{font-size:16px; font-weight:700; color:var(--text);}
.donut-hole .l{font-size:8px; color:var(--muted); letter-spacing:1.5px;}
.legend{display:flex; flex-direction:column; gap:6px;}
.lpill{background:var(--cream); border-radius:var(--r-pill); padding:8px 14px; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text);}
.lpill .r{color:var(--muted);}

.share{position:fixed; right:24px; bottom:20px; width:50px; height:50px; background:var(--share-bg); border:none; color:var(--share-icon); border-radius:50%; font-size:21px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(0,0,0,0.3);}

.pop{position:absolute; z-index:50; background:var(--dropdown); border:1px solid var(--dropdown-border); border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.35); padding:6px; max-height:280px; overflow:auto;}
.opt{display:flex; align-items:center; padding:9px 12px; font-size:12px; color:var(--text); letter-spacing:0.5px; border-radius:10px; cursor:pointer;}
.opt:active{background:var(--glass-field);}
.pop input{width:100%; box-sizing:border-box; background:var(--glass-field); border:1px solid var(--glass-border); color:var(--text); border-radius:var(--r-pill); padding:9px 14px; font-family:inherit; text-transform:uppercase; font-size:12px; outline:none; margin-bottom:6px;}

.cal{width:300px; max-width:90vw; background:var(--cal-bg); border:1px solid var(--cal-border); box-shadow:0 8px 24px rgba(0,0,0,0.3); border-radius:18px; padding:14px;}
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--text);}
.cal-head .ic{padding:6px; font-size:15px; cursor:pointer;}
.cal-wk{display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px;}
.cal-wk span{text-align:center; font-size:9px; letter-spacing:0.5px; color:var(--muted);}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
.cal-d{height:30px; display:flex; align-items:center; justify-content:center; font-size:12px; border-radius:50%; color:var(--text); cursor:pointer;}
.cal-d.sel{background:var(--cal-sel-bg); color:var(--cal-sel-text); font-weight:700;}
.cal-d.empty{visibility:hidden;}

.scrim{position:fixed; inset:0; background:var(--scrim); z-index:100; display:flex; align-items:flex-end; justify-content:center;}
.scrim.center{align-items:center; padding:18px;}
.sheet{width:100%; max-width:440px; background:var(--sheet-bg); border-top-left-radius:24px; border-top-right-radius:24px; padding:18px; max-height:70vh; overflow:auto;}
.sheet h3{font-size:12px; color:var(--muted); letter-spacing:1px; margin:0 0 12px; font-weight:500;}
.trip-row{display:flex; align-items:center; gap:8px; background:var(--accent); border-radius:var(--r-pill); padding:11px 16px; margin-bottom:8px; color:var(--text);}
.trip-row.cur{background:var(--trip-btn); color:var(--trip-btn-text);}
.trip-row .nm{flex:1; font-size:13px; font-weight:500; cursor:pointer;}
.trip-row .ic{font-size:16px; padding:2px; cursor:pointer;}
.trip-row .ic-trash{color:var(--trash);}
.trip-new{display:flex; align-items:center; justify-content:center; gap:8px; border:1.5px dashed var(--cream); border-radius:var(--r-pill); padding:11px; color:var(--text); font-size:13px; background:transparent; width:100%;}
.trip-edit-input{flex:1; min-width:0; background:transparent; border:none; outline:none; font-family:inherit; text-transform:uppercase; font-size:13px; font-weight:500; color:inherit; letter-spacing:0.5px;}
.tick-btn{flex:none; background:transparent; border:none; color:var(--text); padding:2px; font-size:18px; display:flex; align-items:center; cursor:pointer;}

.dialog{background:var(--dialog-bg); border:2px solid var(--dialog-ring); border-radius:22px; padding:22px; width:100%; max-width:330px; box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.dialog .tcirc{width:46px; height:46px; border-radius:50%; background:rgba(192,73,47,0.15); display:flex; align-items:center; justify-content:center; margin:0 auto 12px;}
.dialog .tcirc .ic{color:var(--trash); font-size:22px;}
.dialog .ttl{text-align:center; font-size:14px; font-weight:700; letter-spacing:0.5px; margin-bottom:4px; color:var(--text);}
.dialog .nm{text-align:center; font-size:13px; margin-bottom:10px; color:var(--text);}
.dialog .bd{text-align:center; font-size:12px; line-height:1.6; letter-spacing:0.5px; margin-bottom:18px; color:var(--text);}
.dialog .row{display:flex; gap:10px;}
.dialog .btn{flex:1; border-radius:var(--r-pill); padding:11px; font-size:13px; letter-spacing:0.5px; border:none;}
.dialog .cancel{background:var(--cancel-bg); border:1px solid var(--cancel-border); color:var(--text);}
.dialog .del{background:var(--del-bg); color:var(--del-text); font-weight:700;}
.center-msg{text-align:center; color:var(--muted); font-size:12px; letter-spacing:1px; padding:30px 10px;}
#bgfill{position:fixed; inset:0; background-color:var(--page); z-index:-1;}
</style>
</head>

<div id="bgfill"></div>

<div class="app">
  <div class="header">
    <div class="avatar" id="avatar"><svg class="ic"><use href="#i-user"></use></svg></div>
    <span class="uname" id="uname">…</span>
    <span class="nosync hide" id="nosync">No sync!!</span>
    <span class="spacer"></span>
    <button class="toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="ic ic-sun"><use href="#i-sun"></use></svg><svg class="ic ic-moon"><use href="#i-moon"></use></svg>
      <span class="knob"><svg class="ic ic-sun"><use href="#i-sun"></use></svg><svg class="ic ic-moon"><use href="#i-moon"></use></svg></span>
    </button>
  </div>

  <button class="trip-btn" id="tripBtn">— <svg class="ic"><use href="#i-chevron-down"></use></svg></button>

  <div class="card">
    <div class="total"><div class="lbl">Total spent</div><div class="amt" id="totalAmt">฿0</div></div>

    <div class="form-box">
      <div class="form-head">
        <span class="t" id="formTitle">Add expense</span>
        <svg class="ic ic-x hide" id="formCancel"><use href="#i-x"></use></svg>
      </div>
      <div class="fields">
        <div class="fld" data-readonly id="fDate"><span id="fDateText">—</span><svg class="ic"><use href="#i-calendar"></use></svg></div>
        <div class="fld"><input id="fDesc" placeholder="Description" autocomplete="off"></div>
        <div class="fld placeholder" data-readonly id="fCat"><span id="fCatText">Category</span><svg class="ic"><use href="#i-chevron-down"></use></svg></div>
        <div class="fld placeholder" data-readonly id="fCur"><span id="fCurText">Currency</span><svg class="ic"><use href="#i-chevron-down"></use></svg></div>
        <div class="fld"><input id="fAmt" placeholder="Amount" inputmode="decimal" autocomplete="off"></div>
        <div class="fld"><input id="fRate" placeholder="Rate" inputmode="decimal" autocomplete="off"></div>
        <div class="fld"><span style="color:var(--muted)">= THB</span><span id="fThb" style="font-weight:600;">฿0</span></div>
      </div>
      <button class="submit" id="submitBtn">+ Add</button>
    </div>

    <div class="sec">Summary by date</div>
    <div id="byDate"></div>
    <div class="sec">Summary by category</div>
    <div id="byCat"></div>
  </div>
</div>

<button class="share" id="shareBtn" aria-label="Share"><svg class="ic"><use href="#i-send"></use></svg></button>

  {key:'sightseeing', name:'Sightseeing-Activity', var:'--cat-sightseeing'},
  {key:'eii', name:'Shopping · Eii', var:'--cat-eii'},
  {key:'pla', name:'Shopping · Pla', var:'--cat-pla'},
  {key:'others', name:'Others', var:'--cat-others'},
];
const catById = k => CATEGORIES.find(c=>c.key===k) || CATEGORIES[CATEGORIES.length-1];
const catColor = k => getComputedStyle(document.documentElement).getPropertyValue(catById(k).var).trim();
const DEFAULT_CURRENCIES = ['JPY','USD','EUR','KRW','GBP','CNY','SGD','TWD','HKD'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function ic(name, cls, attrs){ return '<svg class="ic ic-'+name+(cls?(' '+cls):'')+'" '+(attrs||'')+'><use href="#i-'+name+'"></use></svg>'; }

let db=null, profile=null, trips=[], currentTripId=null, currentTrip=null, expenses=[], unsubTrips=null, unsubExp=null, editingId=null;
let form = { dateISO: todayISO(), category:null, currency:null };

function todayISO(){ const d=new Date(); const o=d.getTimezoneOffset(); const t=new Date(d.getTime()-o*60000); return t.toISOString().slice(0,10); }
function parseISO(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDate(iso){ const d=parseISO(iso); return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear(); }
function fmtBaht(n){ return '฿'+Math.round(n).toLocaleString('en-US'); }
function el(id){ return document.getElementById(id); }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function percents(values){
  const total = values.reduce((a,b)=>a+b,0); if(total<=0) return values.map(()=>0);
  const raw = values.map(v=>v/total*100); const floor = raw.map(Math.floor);
  let rem = 100 - floor.reduce((a,b)=>a+b,0);
  const order = raw.map((v,i)=>({i, frac:v-Math.floor(v)})).sort((a,b)=>b.frac-a.frac);
  const out = floor.slice(); for(let k=0;k<rem;k++){ out[order[k % order.length].i]++; } return out;
}

function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); localStorage.setItem('tripexp-theme',t); const m=el('themeColorMeta'); if(m) m.setAttribute('content', t==='night'?'#10182B':'#FFF2BA'); if(typeof renderByDate==='function' && expenses.length){ renderByDate(); renderByCat(); } if(typeof refreshForm==='function') refreshForm(); }
el('themeToggle').addEventListener('click', ()=>{ const c=document.documentElement.getAttribute('data-theme'); applyTheme(c==='light'?'night':'light'); });
applyTheme(localStorage.getItem('tripexp-theme')||'light');

function showFatal(msg){ el('byDate').innerHTML='<div class="center-msg">'+msg+'</div>'; }
async function init(){
  if(typeof firebase==='undefined' || typeof liff==='undefined'){
    showFatal("Couldn't load Firebase / LINE libraries.<br>Open this page over https inside LINE (not the file preview).");
    return;
  }
  // Init Firebase first so UI stays functional even if LIFF fails
  try{ firebase.initializeApp(FIREBASE_CONFIG); db = firebase.firestore(); }
  catch(e){ console.error('Firebase init',e); showFatal('Firebase failed to start. Check your config keys.'); return; }

  // LIFF init with 8s timeout guard — if it hangs, continue without LINE profile
  try{
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('LIFF timeout')),8000))
    ]);
    if(!liff.isLoggedIn()){
      liff.login({ redirectUri: location.href });
      return;
    }
    profile = await liff.getProfile();
    el('uname').textContent = profile.displayName || 'Me';
    if(profile.pictureUrl){
      const img = document.createElement('img');
      img.src = profile.pictureUrl; img.alt = '';
      img.onerror = ()=>{ el('avatar').innerHTML='<svg class="ic"><use href="#i-user"></use></svg>'; };
      el('avatar').innerHTML = '';
      el('avatar').appendChild(img);
    }
  }catch(e){
    // LIFF failed or timed out — app still works, just no LINE profile
    console.warn('LIFF unavailable:', e.message);
    el('uname').textContent = 'Me';
  }

  // Always start Firestore listener regardless of LIFF outcome
  listenTrips();
}
function setSync(ok){ el('nosync').classList.toggle('hide', ok); }
window.addEventListener('online', ()=>setSync(true));
window.addEventListener('offline', ()=>setSync(false));

function listenTrips(){
  unsubTrips = db.collection('trips').orderBy('createdAt','asc').onSnapshot({includeMetadataChanges:true}, snap=>{
    setSync(!snap.metadata.fromCache || navigator.onLine);
    trips = snap.docs.map(d=>({id:d.id, ...d.data()}));
    if(!trips.length){ createTrip('My trip'); return; }
    const saved = localStorage.getItem('tripexp-trip');
    if(!currentTripId || !trips.find(t=>t.id===currentTripId)) currentTripId = (saved && trips.find(t=>t.id===saved)) ? saved : trips[0].id;
    selectTrip(currentTripId);
  }, err=>{ console.error(err); setSync(false); });
}
function selectTrip(id){
  currentTripId=id; currentTrip=trips.find(t=>t.id===id); localStorage.setItem('tripexp-trip',id);
  el('tripBtn').innerHTML = (currentTrip&&currentTrip.name||'—')+' '+ic('chevron-down');
  if(unsubExp){ unsubExp(); unsubExp=null; } cancelEdit();
  unsubExp = db.collection('trips').doc(id).collection('expenses').orderBy('createdAt','asc').onSnapshot({includeMetadataChanges:true}, snap=>{
    setSync(!snap.metadata.fromCache || navigator.onLine);
    expenses = snap.docs.map(d=>({id:d.id, ...d.data()})); renderAll();
  }, err=>{ console.error(err); setSync(false); });
}
function createTrip(name, cb){ db.collection('trips').add({name:name.toUpperCase(), createdAt:Date.now(), rates:{}, currencies:[]}).then(ref=>{ currentTripId=ref.id; localStorage.setItem('tripexp-trip',ref.id); if(cb) cb(ref.id); }); }
function deleteTripNow(id){ const ref=db.collection('trips').doc(id); ref.collection('expenses').get().then(snap=>{ const b=db.batch(); snap.docs.forEach(d=>b.delete(d.ref)); b.delete(ref); return b.commit(); }); }

el('tripBtn').addEventListener('click', openTripSheet);
function openTripSheet(){
  const rows = trips.map(t=>'<div class="trip-row '+(t.id===currentTripId?'cur':'')+'" data-id="'+t.id+'">'+
    (t.id===currentTripId?ic('check'):ic('map-pin','','style="opacity:.5"'))+
    '<span class="nm" data-act="switch">'+escapeHtml(t.name)+'</span>'+
    ic('pencil','','data-act="rename"')+ic('trash','','data-act="delete"')+'</div>').join('');
  const sheet = scrim('<div class="sheet"><h3>Trips</h3><div id="tripList">'+rows+'</div><button class="trip-new" id="newTripBtn">'+ic('plus')+' New trip</button></div>');

  function bindRows(){
    sheet.querySelectorAll('.trip-row').forEach(row=>{ const id=row.dataset.id;
      row.querySelectorAll('[data-act]').forEach(node=>{ node.onclick=(ev)=>{ ev.stopPropagation(); const a=node.dataset.act;
        if(a==='switch'){ selectTrip(id); close(sheet); }
        else if(a==='rename'){ inlineRename(row, id); }
        else if(a==='delete'){ close(sheet); confirmDelete('trip', trips.find(t=>t.id===id)); } }; });
    });
  }
  bindRows();

  // inline rename: name span -> input + tick button in the same row
  function inlineRename(row, id){
    const t = trips.find(x=>x.id===id); if(!t) return;
    const nm = row.querySelector('.nm');
    const inp = document.createElement('input');
    inp.className='trip-edit-input'; inp.value=t.name; inp.setAttribute('autocomplete','off');
    nm.replaceWith(inp);
    // hide pencil, show a tick where it was
    const pencil = row.querySelector('.ic-pencil'); if(pencil) pencil.style.display='none';
    const tick = makeTick();
    row.insertBefore(tick, row.querySelector('.ic-trash'));
    let done=false;
    const commit=()=>{ if(done) return; done=true; const v=inp.value.trim(); if(v) db.collection('trips').doc(id).update({name:v.toUpperCase()}); close(sheet); };
    tick.onclick=(e)=>{ e.stopPropagation(); commit(); };
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } if(e.key==='Escape') close(sheet); });
    setTimeout(()=>{ inp.focus(); inp.select(); }, 30);
  }

  // inline new trip: button -> input + tick button (no auto-commit on blur)
  el2(sheet,'#newTripBtn').onclick=()=>{
    const btn = sheet.querySelector('#newTripBtn');
    const wrap = document.createElement('div');
    wrap.className='trip-row'; wrap.style.background='transparent'; wrap.style.border='1.5px dashed var(--cream)';
    const inp = document.createElement('input');
    inp.className='trip-edit-input'; inp.placeholder='New trip name'; inp.setAttribute('autocomplete','off');
    const tick = makeTick();
    wrap.appendChild(inp); wrap.appendChild(tick);
    btn.replaceWith(wrap);
    let done=false;
    const commit=()=>{ if(done) return; const v=inp.value.trim(); if(!v){ inp.focus(); return; } done=true; createTrip(v, id=>selectTrip(id)); close(sheet); };
    tick.onclick=(e)=>{ e.stopPropagation(); commit(); };
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } if(e.key==='Escape') close(sheet); });
    setTimeout(()=>inp.focus(), 30);
  };
}
function makeTick(){ const b=document.createElement('button'); b.className='tick-btn'; b.setAttribute('aria-label','Save'); b.innerHTML=ic('check'); return b; }
function el2(root, sel){ return root.querySelector(sel); }

function renderAll(){ renderTotal(); renderByDate(); renderByCat(); renderDescList(); refreshForm(); }
function grandTotal(){ return expenses.reduce((a,e)=>a+(e.thb||0),0); }
function renderTotal(){ el('totalAmt').textContent = fmtBaht(grandTotal()); }
function renderByDate(){
  const box=el('byDate'); if(!expenses.length){ box.innerHTML='<div class="center-msg">No expenses yet</div>'; return; }
  const grand=grandTotal(); const groups={}; expenses.forEach(e=>{ (groups[e.date]=groups[e.date]||[]).push(e); });
  const dates=Object.keys(groups).sort((a,b)=>a<b?1:-1);
  box.innerHTML = dates.map(date=>{ const items=groups[date]; const sum=items.reduce((a,e)=>a+(e.thb||0),0); const pct=grand>0?Math.round(sum/grand*100):0;
    const rows=items.map(e=>'<div class="erow '+(e.id===editingId?'editing':'')+'"><span class="desc" data-edit="'+e.id+'"><span class="dot" style="background:'+catColor(e.category)+'"></span><span class="txt">'+escapeHtml(e.description)+'</span></span><span class="amt">'+fmtBaht(e.thb)+'</span>'+ic('trash','','data-del="'+e.id+'"')+'</div>').join('');
    return '<div class="date-head"><span class="d">'+fmtDate(date)+'</span><span class="p">'+fmtBaht(sum)+' · '+pct+'%</span></div>'+rows;
  }).join('');
  box.querySelectorAll('[data-edit]').forEach(n=> n.onclick=()=>startEdit(n.dataset.edit));
  box.querySelectorAll('[data-del]').forEach(n=> n.onclick=()=>{ const e=expenses.find(x=>x.id===n.dataset.del); confirmDelete('expense',e); });
}
function renderByCat(){
  const box=el('byCat'); if(!expenses.length){ box.innerHTML=''; return; }
  let rows=CATEGORIES.map(c=>({c, sum:expenses.filter(e=>e.category===c.key).reduce((a,e)=>a+(e.thb||0),0)}));
  rows.sort((a,b)=>b.sum-a.sum);
  const pcts=percents(rows.map(r=>r.sum)); const grand=grandTotal(); let acc=0; const stops=[];
  rows.forEach((r,i)=>{ if(pcts[i]<=0) return; const f=acc,t=acc+pcts[i]; stops.push(catColor(r.c.key)+' '+f+'% '+t+'%'); acc=t; });
  if(acc<100 && stops.length){ const last=rows.find((r,i)=>pcts[i]>0); if(last) stops.push(catColor(last.c.key)+' '+acc+'% 100%'); }
  const gradient = stops.length ? 'conic-gradient('+stops.join(',')+')' : 'var(--cream)';
  const legend = rows.map((r,i)=> r.sum>0 ? '<div class="lpill"><span><span class="dot" style="background:'+catColor(r.c.key)+'"></span>'+r.c.name+'</span><span class="r">'+fmtBaht(r.sum)+' · '+pcts[i]+'%</span></div>' : '').join('');
  box.innerHTML = '<div class="donut-wrap" style="background:'+gradient+'"><div class="donut-hole"><span class="v">'+fmtBaht(grand)+'</span><span class="l">Total</span></div></div><div class="legend">'+legend+'</div>';
}
function renderDescList(){ const names=[...new Set(expenses.map(e=>e.description))]; el('descList').innerHTML = names.map(n=>'<option value="'+escapeHtml(n)+'">').join(''); }

el('fDesc').setAttribute('list','descList');
function refreshForm(){
  el('fDateText').textContent = fmtDate(form.dateISO);
  const cat = form.category ? catById(form.category) : null;
  if(cat){ el('fCat').classList.remove('placeholder'); el('fCatText').innerHTML='<span class="dot" style="background:'+catColor(cat.key)+'"></span>'+cat.name; }
  else { el('fCat').classList.add('placeholder'); el('fCatText').textContent='Category'; }
  if(form.currency){ el('fCur').classList.remove('placeholder'); el('fCurText').textContent=form.currency; }
  else { el('fCur').classList.add('placeholder'); el('fCurText').textContent='Currency'; }
  recalcThb();
}
function recalcThb(){ const a=parseFloat(el('fAmt').value)||0, r=parseFloat(el('fRate').value)||0; el('fThb').textContent=fmtBaht(a*r); }
el('fAmt').addEventListener('input', recalcThb); el('fRate').addEventListener('input', recalcThb);

el('fDate').addEventListener('click', openCalendar);
function openCalendar(){
  let view=parseISO(form.dateISO); view=new Date(view.getFullYear(), view.getMonth(), 1);
  const wrap=scrim('<div></div>'); wrap.classList.add('center'); const host=wrap.firstElementChild;
  function draw(){
    const y=view.getFullYear(), m=view.getMonth(); const first=new Date(y,m,1).getDay(); const days=new Date(y,m+1,0).getDate();
    let cells=''; for(let i=0;i<first;i++) cells+='<div class="cal-d empty"></div>';
    for(let d=1; d<=days; d++){ const iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); cells+='<div class="cal-d '+(iso===form.dateISO?'sel':'')+'" data-iso="'+iso+'">'+d+'</div>'; }
    host.innerHTML='<div class="cal"><div class="cal-head">'+ic('chevron-left','','data-nav="-1"')+'<span>'+MONTHS[m]+' '+y+'</span>'+ic('chevron-right','','data-nav="1"')+'</div><div class="cal-wk"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="cal-grid">'+cells+'</div></div>';
    host.querySelectorAll('[data-nav]').forEach(n=> n.onclick=(e)=>{ e.stopPropagation(); view.setMonth(view.getMonth()+Number(n.dataset.nav)); draw(); });
    host.querySelectorAll('[data-iso]').forEach(n=> n.onclick=(e)=>{ e.stopPropagation(); form.dateISO=n.dataset.iso; refreshForm(); close(wrap); });
  }
  draw();
}
el('fCat').addEventListener('click', ()=>{
  const opts=CATEGORIES.map(c=>'<div class="opt" data-key="'+c.key+'"><span class="dot" style="background:'+catColor(c.key)+'"></span>'+c.name+'</div>').join('');
  const pop=popoverBelow(el('fCat'), opts);
  pop.querySelectorAll('[data-key]').forEach(n=> n.onclick=()=>{ form.category=n.dataset.key; refreshForm(); closePop(); });
});
el('fCur').addEventListener('click', ()=>{
  const uniq=[...new Set([...DEFAULT_CURRENCIES, ...((currentTrip&&currentTrip.currencies)||[])])];
  const pop=popoverBelow(el('fCur'), '<input id="curInput" placeholder="Type or pick…" autocomplete="off"><div id="curList"></div>');
  const inp=pop.querySelector('#curInput');
  const list=pop.querySelector('#curList');
  function renderList(){
    const f=(inp.value||'').toUpperCase();
    const shown=uniq.filter(c=>c.includes(f));
    let html=shown.map(c=>'<div class="opt" data-cur="'+c+'">'+c+'</div>').join('');
    if(f && !uniq.includes(f)) html+='<div class="opt" data-cur="'+f+'" style="color:var(--muted)">'+ic('plus','','style="margin-right:8px"')+'Add "'+f+'"</div>';
    list.innerHTML=html;
    list.querySelectorAll('[data-cur]').forEach(n=> n.onclick=()=>{ pickCurrency(n.dataset.cur); closePop(); });
  }
  inp.addEventListener('input', renderList);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const v=inp.value.trim().toUpperCase(); if(v){ pickCurrency(v); closePop(); } } });
  renderList();
  setTimeout(()=>inp.focus(), 30);
});
function pickCurrency(cur){ form.currency=cur.toUpperCase(); const r=currentTrip&&currentTrip.rates&&currentTrip.rates[form.currency]; if(r!=null) el('fRate').value=r; refreshForm(); }

el('submitBtn').addEventListener('click', submitForm);
function submitForm(){
  const desc=el('fDesc').value.trim(); const amt=parseFloat(el('fAmt').value); const rate=parseFloat(el('fRate').value);
  if(!desc||!form.category||!form.currency||!(amt>0)||!(rate>0)){ flash(el('submitBtn')); return; }
  const data={ date:form.dateISO, description:desc, category:form.category, currency:form.currency, amount:amt, rate:rate, thb:amt*rate };
  const tripRef=db.collection('trips').doc(currentTripId);
  const upd={}; upd['rates.'+form.currency]=rate; tripRef.update(upd).catch(()=>{});
  if(!DEFAULT_CURRENCIES.includes(form.currency)) tripRef.update({currencies: firebase.firestore.FieldValue.arrayUnion(form.currency)}).catch(()=>{});
  if(editingId){ tripRef.collection('expenses').doc(editingId).update(data).then(cancelEdit); }
  else { data.createdAt=Date.now(); tripRef.collection('expenses').add(data).then(()=>clearForm()); }
}
function startEdit(id){
  const e=expenses.find(x=>x.id===id); if(!e) return; editingId=id;
  form.dateISO=e.date; form.category=e.category; form.currency=e.currency;
  el('fDesc').value=e.description; el('fAmt').value=e.amount; el('fRate').value=e.rate;
  el('formTitle').textContent='Edit expense'; el('formCancel').classList.remove('hide'); el('submitBtn').textContent='Update';
  refreshForm(); renderByDate(); document.querySelector('.form-box').scrollIntoView({behavior:'smooth', block:'center'});
}
function cancelEdit(){ editingId=null; clearForm(); el('formTitle').textContent='Add expense'; el('formCancel').classList.add('hide'); el('submitBtn').textContent='+ Add'; renderByDate(); }
function clearForm(){ el('fDesc').value=''; el('fAmt').value=''; el('fRate').value=''; form.dateISO=todayISO(); form.category=null; form.currency=null; refreshForm(); }
el('formCancel').addEventListener('click', cancelEdit);
function flash(node){ node.animate([{opacity:1},{opacity:.4},{opacity:1}],{duration:300}); }

el('shareBtn').addEventListener('click', shareTrip);
async function shareTrip(){
  if(!currentTrip) return; const grand=grandTotal();
  const sums=CATEGORIES.map(c=> expenses.filter(e=>e.category===c.key).reduce((a,e)=>a+(e.thb||0),0)); const pcts=percents(sums);
  let msg=currentTrip.name+'\nTOTAL '+fmtBaht(grand)+'\n\n— BY CATEGORY —\n';
  CATEGORIES.forEach((c,i)=>{ if(sums[i]>0) msg+='• '+c.name+': '+fmtBaht(sums[i])+' ('+pcts[i]+'%)\n'; });
  msg+='\n— BY DATE —\n'; const groups={}; expenses.forEach(e=>{ (groups[e.date]=groups[e.date]||[]).push(e); });
  Object.keys(groups).sort((a,b)=>a<b?1:-1).forEach(date=>{ const sum=groups[date].reduce((a,e)=>a+(e.thb||0),0); msg+='\n'+fmtDate(date)+' — '+fmtBaht(sum)+'\n'; groups[date].forEach(e=>{ msg+='  - '+e.description+': '+fmtBaht(e.thb)+'\n'; }); });
  try{
    const inClient = liff && liff.isInClient && liff.isInClient();
    const canShare = liff && liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker');
    if(inClient && canShare){
      // Share to any LINE chat/friend (requires Share Target Picker enabled in console)
      await liff.shareTargetPicker([{type:'text', text:msg}]);
    } else if(inClient){
      // Fallback: send to current chat and close
      await liff.sendMessages([{type:'text', text:msg}]);
    } else if(navigator.share){
      // Native Web Share API (works in some mobile browsers)
      await navigator.share({ text: msg });
    } else {
      await navigator.clipboard.writeText(msg);
      alert('Summary copied to clipboard!');
    }
  }catch(e){
    console.warn('Share failed:', e);
    try{ await navigator.clipboard.writeText(msg); alert('Summary copied to clipboard!'); }
    catch(_){ prompt('Copy this summary:', msg); }
  }
}

function confirmDelete(kind, item){
  if(!item) return; const isTrip=kind==='trip';
  const title=isTrip?'Delete trip?':'Delete expense?';
  const name=isTrip?item.name:(item.description+' · '+fmtBaht(item.thb));
  const body=isTrip?"This removes the trip and all its expenses. This can't be undone.":"This removes this expense. This can't be undone.";
  const wrap=scrim('<div class="dialog"><div class="tcirc">'+ic('trash')+'</div><div class="ttl">'+title+'</div><div class="nm">'+escapeHtml(name)+'</div><div class="bd">'+body+'</div><div class="row"><button class="btn cancel" data-x="c">Cancel</button><button class="btn del" data-x="d">Delete</button></div></div>');
  wrap.classList.add('center');
  wrap.querySelector('[data-x="c"]').onclick=()=>close(wrap);
  wrap.querySelector('[data-x="d"]').onclick=()=>{ if(isTrip) deleteTripNow(item.id); else db.collection('trips').doc(currentTripId).collection('expenses').doc(item.id).delete().then(()=>{ if(editingId===item.id) cancelEdit(); }); close(wrap); };
}

function scrim(innerHTML){ const div=document.createElement('div'); div.className='scrim'; div.innerHTML=innerHTML; div.addEventListener('click', e=>{ if(e.target===div) close(div); }); document.body.appendChild(div); return div; }
function close(node){ if(node&&node.parentNode) node.parentNode.removeChild(node); }
let curPop=null;
function popoverBelow(anchor, innerHTML){ closePop(); const r=anchor.getBoundingClientRect(); const pop=document.createElement('div'); pop.className='pop'; pop.innerHTML=innerHTML; pop.style.left=r.left+'px'; pop.style.top=(r.bottom+6+window.scrollY)+'px'; pop.style.width=r.width+'px'; document.body.appendChild(pop); curPop=pop; setTimeout(()=>document.addEventListener('click', outside),0); function outside(e){ if(!pop.contains(e.target)&&e.target!==anchor&&!anchor.contains(e.target)) closePop(); } pop._outside=outside; return pop; }
function closePop(){ if(curPop){ document.removeEventListener('click', curPop._outside); close(curPop); curPop=null; } }

if(document.readyState==='complete') init();
else window.addEventListener('load', init);
</script>
